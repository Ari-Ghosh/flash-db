name: Build

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: Build Binary
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            target: linux
            artifact: flashdb
          - os: macos-latest
            target: darwin
            artifact: flashdb
          - os: windows-latest
            target: windows
            artifact: flashdb.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22.2'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build -ldflags="-s -w" -o bin/${{ matrix.artifact }} ./src
        env:
          GOOS: ${{ matrix.target }}
          GOARCH: amd64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flashdb-${{ matrix.target }}-amd64
          path: bin/${{ matrix.artifact }}

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          tags: flashdb:latest
