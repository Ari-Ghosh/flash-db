version: "2"

run:
  tests: true

# Formatters have been completely separated from Linters in v2
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes: local/flashdb

linters:
  enable:
    # Default linters
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    
    # Additional useful linters
    - bodyclose
    - dogsled
    - dupl
    - errname
    - errorlint
    - copyloopvar
    - exhaustive
    - forcetypeassert
    - funlen
    - gochecknoglobals
    - gochecknoinits
    - gocritic
    - gocyclo
    - godot
    - godox
    - gomodguard
    - goprintffuncname
    - gosec
    - lll
    - misspell
    - nakedret
    - nolintlint
    - prealloc
    - predeclared
    - revive
    - stylecheck
    - tagliatelle
    - unconvert
    - unparam
    - wastedassign
    - whitespace

  # linters-settings is now nested directly under 'linters:'
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false

    gocyclo:
      min-complexity: 25

    funlen:
      lines: 100
      statements: 50

    lll:
      line-length: 120
      tab-width: 4

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - opinionated
        - performance
      disabled-checks:
        - hugeParam
        - ifElseChain

    gosec:
      excludes:
        - G404
        - G115
        - G102
        - G306

    revive:
      ignore-generated-header: true
      severity: warning

    godox:
      keywords:
        - TODO
        - FIXME
        - BUG
        - HACK

    tagliatelle:
      case:
        rules:
          json: snake
          yaml: snake

issues:
  exclude-dirs:
    - vendor
    - docs

  exclude-rules:
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck
        - dupl
        - funlen

    - path: _test\.go
      linters:
        - godot

    - source: "^func \\(.*\\) [A-Z]"
      linters:
        - unparam

  max-issues-per-linter: 0
  max-same-issues: 0