version: "2"

run:
  tests: true

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - local/flashdb

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - dogsled
    - dupl
    - errname
    - errorlint
    - copyloopvar
    - exhaustive
    - forcetypeassert
    - funlen
    - gochecknoglobals
    - gochecknoinits
    - gocritic
    - gocyclo
    - godot
    - godox
    - gomodguard_v2
    - goprintffuncname
    - gosec
    - lll
    - misspell
    - nakedret
    - nolintlint
    - prealloc
    - predeclared
    - revive
    - tagliatelle
    - unconvert
    - unparam
    - wastedassign
    - whitespace

  exclusions:
    paths:
      - vendor
      - docs
    rules:
      - path: _test\.go
        linters:
          - gocyclo
          - errcheck
          - dupl
          - funlen
          - godot
      - source: "^func \\(.*\\) [A-Z]"
        linters:
          - unparam

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
    gocyclo:
      min-complexity: 25
    funlen:
      lines: 100
      statements: 50
    lll:
      line-length: 200
      tab-width: 4
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - opinionated
        - performance
      disabled-checks:
        - hugeParam
        - ifElseChain
    gosec:
      excludes:
        - G404
        - G115
        - G102
        - G306
    revive:
      severity: warning
    godox:
      keywords:
        - TODO
        - FIXME
        - BUG
        - HACK
    tagliatelle:
      case:
        rules:
          json: snake
          yaml: snake

issues:
  max-issues-per-linter: 0
  max-same-issues: 0