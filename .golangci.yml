run:
  timeout: 5m
  tests: true

output:
  formats: colored-line-number
  print-issued-lines: true
  print-linter-name: true

linters:
  enable:
    # Default linters
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused
    
    # Additional useful linters
    - bodyclose
    - dogsled
    - dupl
    - errname
    - errorlint
    # - exportloopref
    - copyloopvar
    - exhaustive
    - forcetypeassert
    - funlen
    - gochecknoglobals
    - gochecknoinits
    - gocritic
    - gocyclo
    - godot
    - godox
    - gofmt
    - goimports
    - gomodguard
    - goprintffuncname
    - gosec
    - lll
    - misspell
    - nakedret
    - nolintlint
    - prealloc
    - predeclared
    - revive
    - stylecheck
    - tagliatelle
    - unconvert
    - unparam
    - wastedassign
    - whitespace

linters-settings:
  # Error checking
  errcheck:
    check-type-assertions: true
    check-blank: false

  # Code complexity
  gocyclo:
    min-complexity: 25

  funlen:
    lines: 100
    statements: 50

  lll:
    line-length: 120
    tab-width: 4

  # Import formatting
  goimports:
    local-prefixes: local/flashdb

  # Code style
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - opinionated
      - performance
    disabled-checks:
      - hugeParam
      - ifElseChain

  gosec:
    excludes:
      - G404
      - G115
      - G102
      - G306

  revive:
    ignore-generated-header: true
    severity: warning

  godox:
    keywords:
      - TODO
      - FIXME
      - BUG
      - HACK

  # Naming
  tagliatelle:
    case:
      rules:
        json: snake
        yaml: snake

issues:
  exclude-dirs:
    - vendor
    - docs

  exclude-rules:
    # Exclude some linters from running on test files
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck
        - dupl
        - funlen

    # Exclude godot for test files
    - path: _test\.go
      linters:
        - godot

    # Allow unused parameters in interfaces
    - source: "^func \\(.*\\) [A-Z]"
      linters:
        - unparam

  max-issues-per-linter: 0
  max-same-issues: 0
